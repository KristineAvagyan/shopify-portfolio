<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-i18n="pageTitle">Éternelle — Luxury Wedding Planning</title>
  <meta name="description" content="Éternelle Wedding Planning — Crafting unforgettable weddings with elegance, passion, and attention to every detail." />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Montserrat:wght@300;400;500;600&family=Great+Vibes&display=swap" rel="stylesheet">

  <style>
    :root {
      --blush: #f5e6e0;
      --blush-deep: #e8c4b8;
      --ivory: #fdfbf7;
      --cream: #faf5ef;
      --gold: #c9a961;
      --gold-dark: #a8893f;
      --sage: #9caf9a;
      --sage-dark: #7a8f78;
      --charcoal: #2d2a26;
      --text: #4a4540;
      --text-light: #7a736d;
      --white: #ffffff;
      --border: rgba(201, 169, 97, 0.2);
      --shadow: 0 15px 50px rgba(45, 42, 38, 0.08);
      --shadow-lg: 0 25px 70px rgba(45, 42, 38, 0.15);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Montserrat', sans-serif;
      color: var(--text);
      background: var(--ivory);
      line-height: 1.7;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }
    h1, h2, h3, h4, h5 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 500;
      line-height: 1.2;
      color: var(--charcoal);
    }
    .script {
      font-family: 'Great Vibes', cursive;
      font-weight: 400;
    }
    img { max-width: 100%; display: block; }
    a { text-decoration: none; color: inherit; }
    .container { max-width: 1240px; margin: 0 auto; padding: 0 28px; }

    /* ---------- Buttons ---------- */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 15px 38px;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.4s ease;
      border: none;
      font-family: inherit;
      position: relative;
      overflow: hidden;
    }
    .btn-primary {
      background: var(--charcoal);
      color: var(--white);
    }
    .btn-primary:hover {
      background: var(--gold);
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(201, 169, 97, 0.35);
    }
    .btn-outline {
      background: transparent;
      color: var(--white);
      border: 1px solid rgba(255, 255, 255, 0.6);
    }
    .btn-outline:hover {
      background: var(--white);
      color: var(--charcoal);
      border-color: var(--white);
    }
    .btn-gold {
      background: var(--gold);
      color: var(--white);
    }
    .btn-gold:hover {
      background: var(--gold-dark);
      transform: translateY(-2px);
    }

    /* ---------- Navigation ---------- */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      padding: 22px 0;
      z-index: 1000;
      transition: all 0.4s ease;
      background: transparent;
    }
    nav.scrolled {
      background: rgba(253, 251, 247, 0.97);
      backdrop-filter: blur(12px);
      box-shadow: 0 2px 20px rgba(45, 42, 38, 0.06);
      padding: 14px 0;
    }
    .nav-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      line-height: 1;
    }
    .logo-main {
      font-family: 'Cormorant Garamond', serif;
      font-size: 32px;
      font-weight: 500;
      letter-spacing: 6px;
      color: var(--white);
      transition: color 0.4s;
    }
    .logo-sub {
      font-family: 'Montserrat', sans-serif;
      font-size: 9px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--gold);
      margin-top: 4px;
    }
    nav.scrolled .logo-main { color: var(--charcoal); }

    .nav-links {
      display: flex;
      gap: 38px;
      list-style: none;
    }
    .nav-links a {
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--white);
      transition: color 0.3s;
      position: relative;
      font-weight: 400;
    }
    nav.scrolled .nav-links a { color: var(--charcoal); }
    .nav-links a::after {
      content: '';
      position: absolute;
      bottom: -6px; left: 50%;
      width: 0; height: 1px;
      background: var(--gold);
      transition: all 0.3s;
      transform: translateX(-50%);
    }
    .nav-links a:hover { color: var(--gold); }
    .nav-links a:hover::after { width: 100%; }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .lang-switcher {
      display: flex;
      gap: 2px;
      padding: 4px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 2px;
      transition: all 0.4s;
    }
    nav.scrolled .lang-switcher {
      background: var(--cream);
      border-color: var(--border);
    }
    .lang-btn {
      background: transparent;
      border: none;
      color: rgba(255, 255, 255, 0.8);
      padding: 6px 12px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1.5px;
      cursor: pointer;
      transition: all 0.3s;
      font-family: inherit;
      text-transform: uppercase;
    }
    nav.scrolled .lang-btn { color: var(--text-light); }
    .lang-btn:hover { color: var(--gold); }
    .lang-btn.active {
      background: var(--gold);
      color: var(--white);
    }

    .menu-toggle {
      display: none;
      background: none;
      border: none;
      color: var(--white);
      font-size: 22px;
      cursor: pointer;
    }
    nav.scrolled .menu-toggle { color: var(--charcoal); }

    /* ---------- Hero ---------- */
    .hero {
      min-height: 100vh;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: var(--white);
      overflow: hidden;
    }
    .hero-bg {
      position: absolute;
      inset: 0;
      z-index: 0;
    }
    .hero-bg img {
      width: 100%; height: 100%;
      object-fit: cover;
      animation: slowZoom 20s ease-in-out infinite alternate;
    }
    @keyframes slowZoom {
      from { transform: scale(1); }
      to { transform: scale(1.08); }
    }
    .hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(45, 42, 38, 0.4) 0%, rgba(45, 42, 38, 0.55) 50%, rgba(45, 42, 38, 0.7) 100%);
    }
    .hero-content {
      position: relative;
      z-index: 2;
      max-width: 820px;
      padding: 0 24px;
      animation: fadeUp 1.4s ease;
    }
    .hero-ornament {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-bottom: 24px;
      color: var(--gold);
      font-size: 14px;
      letter-spacing: 4px;
    }
    .hero-ornament::before,
    .hero-ornament::after {
      content: '';
      width: 50px;
      height: 1px;
      background: var(--gold);
    }
    .hero-subtitle {
      font-family: 'Great Vibes', cursive;
      font-size: clamp(32px, 5vw, 56px);
      color: var(--gold);
      margin-bottom: 12px;
      font-weight: 400;
    }
    .hero h1 {
      font-size: clamp(42px, 7vw, 88px);
      color: var(--white);
      margin-bottom: 24px;
      font-weight: 400;
      letter-spacing: 2px;
    }
    .hero h1 em {
      font-style: italic;
      color: var(--gold);
      font-weight: 300;
    }
    .hero p {
      font-size: 17px;
      margin-bottom: 44px;
      font-weight: 300;
      max-width: 580px;
      margin-left: auto;
      margin-right: auto;
      opacity: 0.92;
      letter-spacing: 0.5px;
    }
    .hero-buttons {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .scroll-indicator {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      color: var(--white);
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      opacity: 0.7;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    .scroll-line {
      width: 1px;
      height: 40px;
      background: linear-gradient(to bottom, var(--gold), transparent);
      animation: scrollPulse 2s ease-in-out infinite;
    }
    @keyframes scrollPulse {
      0%, 100% { transform: scaleY(1); opacity: 1; }
      50% { transform: scaleY(0.6); opacity: 0.5; }
    }

    /* ---------- Section Headings ---------- */
    section { padding: 120px 0; }
    .section-head { text-align: center; margin-bottom: 70px; }
    .section-tag {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      font-size: 11px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 18px;
      font-weight: 500;
    }
    .section-tag::before,
    .section-tag::after {
      content: '';
      width: 40px;
      height: 1px;
      background: var(--gold);
    }
    .section-head h2 {
      font-size: clamp(36px, 5vw, 56px);
      margin-bottom: 20px;
      font-weight: 400;
    }
    .section-head h2 em {
      font-style: italic;
      color: var(--gold-dark);
    }
    .section-head p {
      color: var(--text-light);
      max-width: 620px;
      margin: 0 auto;
      font-size: 16px;
      font-weight: 300;
    }

    /* ---------- About ---------- */
    .about {
      background: var(--cream);
    }
    .about-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 80px;
      align-items: center;
    }
    .about-image {
      position: relative;
    }
    .about-image img {
      width: 100%;
      height: 560px;
      object-fit: cover;
      border-radius: 2px;
      box-shadow: var(--shadow-lg);
    }
    .about-image::before {
      content: '';
      position: absolute;
      top: -20px; left: -20px;
      width: 100%; height: 100%;
      border: 1px solid var(--gold);
      border-radius: 2px;
      z-index: -1;
    }
    .about-content .section-tag {
      justify-content: flex-start;
    }
    .about-content .section-tag::before { display: none; }
    .about-content h2 {
      font-size: clamp(32px, 4vw, 48px);
      margin-bottom: 24px;
      text-align: left;
    }
    .about-content h2 em {
      font-style: italic;
      color: var(--gold-dark);
    }
    .about-text {
      color: var(--text-light);
      margin-bottom: 18px;
      font-size: 15px;
      font-weight: 300;
    }
    .about-signature {
      font-family: 'Great Vibes', cursive;
      font-size: 42px;
      color: var(--gold);
      margin-top: 28px;
    }
    .about-role {
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text-light);
      margin-top: 4px;
    }

    /* ---------- Services ---------- */
    .services {
      background: var(--ivory);
    }
    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 32px;
    }
    .service-card {
      background: var(--white);
      padding: 48px 32px;
      text-align: center;
      border: 1px solid var(--border);
      border-radius: 2px;
      transition: all 0.5s ease;
      position: relative;
      overflow: hidden;
    }
    .service-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 3px;
      background: var(--gold);
      transform: scaleX(0);
      transform-origin: center;
      transition: transform 0.5s;
    }
    .service-card:hover {
      transform: translateY(-8px);
      box-shadow: var(--shadow-lg);
      border-color: var(--gold);
    }
    .service-card:hover::before { transform: scaleX(1); }
    .service-icon {
      width: 72px; height: 72px;
      margin: 0 auto 24px;
      background: var(--blush);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--gold-dark);
      transition: all 0.4s;
    }
    .service-card:hover .service-icon {
      background: var(--gold);
      color: var(--white);
      transform: rotate(-5deg) scale(1.05);
    }
    .service-icon svg { width: 32px; height: 32px; }
    .service-card h3 {
      font-size: 26px;
      margin-bottom: 14px;
      font-weight: 500;
    }
    .service-card p {
      color: var(--text-light);
      font-size: 14px;
      font-weight: 300;
      line-height: 1.8;
    }

    /* ---------- Gallery ---------- */
    .gallery {
      background: var(--cream);
    }
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-auto-rows: 220px;
      gap: 16px;
    }
    .gallery-item {
      position: relative;
      overflow: hidden;
      border-radius: 2px;
      cursor: pointer;
    }
    .gallery-item:nth-child(1) { grid-column: span 2; grid-row: span 2; }
    .gallery-item:nth-child(4) { grid-column: span 2; }
    .gallery-item img {
      width: 100%; height: 100%;
      object-fit: cover;
      transition: transform 0.8s ease;
    }
    .gallery-item:hover img { transform: scale(1.08); }
    .gallery-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(45, 42, 38, 0.8), transparent 60%);
      display: flex;
      align-items: flex-end;
      padding: 24px;
      opacity: 0;
      transition: opacity 0.4s;
    }
    .gallery-item:hover .gallery-overlay { opacity: 1; }
    .gallery-overlay span {
      color: var(--white);
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      font-style: italic;
    }

    /* ---------- Testimonials ---------- */
    .testimonials {
      background: var(--ivory);
      position: relative;
    }
    .testimonial-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 32px;
    }
    .testimonial {
      background: var(--white);
      padding: 44px 36px;
      text-align: center;
      border: 1px solid var(--border);
      border-radius: 2px;
      transition: all 0.4s;
      position: relative;
    }
    .testimonial:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow);
      border-color: var(--gold);
    }
    .quote-mark {
      font-family: 'Great Vibes', cursive;
      font-size: 80px;
      color: var(--gold);
      line-height: 0.5;
      margin-bottom: 20px;
      opacity: 0.6;
    }
    .stars {
      color: var(--gold);
      margin-bottom: 18px;
      letter-spacing: 3px;
      font-size: 14px;
    }
    .testimonial p {
      font-family: 'Cormorant Garamond', serif;
      font-size: 19px;
      font-style: italic;
      color: var(--text);
      margin-bottom: 28px;
      line-height: 1.7;
      font-weight: 400;
    }
    .testimonial-author {
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }
    .testimonial-author h4 {
      font-size: 18px;
      margin-bottom: 4px;
      font-weight: 500;
    }
    .testimonial-author span {
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--gold-dark);
    }

    /* ---------- Contact ---------- */
    .contact {
      background: linear-gradient(rgba(45, 42, 38, 0.85), rgba(45, 42, 38, 0.9)),
                  url('https://images.unsplash.com/photo-1519741497674-611481863552?auto=format&fit=crop&w=1600&q=80') center/cover fixed;
      color: var(--white);
    }
    .contact .section-head h2 { color: var(--white); }
    .contact .section-head p { color: rgba(255, 255, 255, 0.75); }
    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 60px;
      align-items: start;
    }
    .contact-info h3 {
      font-size: 32px;
      color: var(--white);
      margin-bottom: 20px;
    }
    .contact-info h3 em {
      font-style: italic;
      color: var(--gold);
    }
    .contact-info > p {
      color: rgba(255, 255, 255, 0.8);
      margin-bottom: 36px;
      font-weight: 300;
    }
    .contact-item {
      display: flex;
      gap: 18px;
      margin-bottom: 24px;
      align-items: flex-start;
    }
    .contact-icon {
      width: 48px; height: 48px;
      background: rgba(201, 169, 97, 0.15);
      border: 1px solid var(--gold);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--gold);
      flex-shrink: 0;
      transition: all 0.3s;
    }
    .contact-item:hover .contact-icon {
      background: var(--gold);
      color: var(--white);
    }
    .contact-icon svg { width: 20px; height: 20px; }
    .contact-item h4 {
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 4px;
      font-family: 'Montserrat', sans-serif;
      font-weight: 500;
    }
    .contact-item p, .contact-item a {
      color: var(--white);
      font-size: 15px;
      font-weight: 300;
      transition: color 0.3s;
    }
    .contact-item a:hover { color: var(--gold); }

    .contact-form {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      padding: 44px;
      border-radius: 2px;
    }
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 10px;
      font-weight: 500;
    }
    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 14px 16px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 2px;
      color: var(--white);
      font-family: inherit;
      font-size: 14px;
      outline: none;
      transition: border-color 0.3s;
    }
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      border-color: var(--gold);
    }
    .form-group input::placeholder,
    .form-group textarea::placeholder {
      color: rgba(255, 255, 255, 0.4);
    }
    .form-group select option {
      background: var(--charcoal);
    }
    .form-group textarea {
      resize: vertical;
      min-height: 110px;
    }
    .contact-form .btn {
      width: 100%;
      justify-content: center;
    }

    /* ---------- Footer ---------- */
    footer {
      background: var(--charcoal);
      color: rgba(255, 255, 255, 0.6);
      padding: 80px 0 30px;
    }
    .footer-grid {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr 1fr;
      gap: 50px;
      margin-bottom: 50px;
    }
    .footer-brand .logo-main { color: var(--white); }
    .footer-brand p {
      font-size: 14px;
      line-height: 1.8;
      margin: 20px 0;
      max-width: 320px;
      font-weight: 300;
    }
    .socials { display: flex; gap: 12px; }
    .socials a {
      width: 40px; height: 40px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
      color: rgba(255, 255, 255, 0.7);
    }
    .socials a:hover {
      background: var(--gold);
      border-color: var(--gold);
      color: var(--white);
      transform: translateY(-3px);
    }
    .socials svg { width: 16px; height: 16px; }
    .footer-col h4 {
      color: var(--white);
      font-size: 13px;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 22px;
      font-family: 'Montserrat', sans-serif;
      font-weight: 500;
    }
    .footer-col ul { list-style: none; }
    .footer-col li { margin-bottom: 12px; }
    .footer-col a {
      font-size: 14px;
      transition: color 0.3s;
      font-weight: 300;
    }
    .footer-col a:hover { color: var(--gold); }
    .footer-bottom {
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      padding-top: 28px;
      text-align: center;
      font-size: 12px;
      letter-spacing: 1px;
    }
    .footer-bottom em {
      font-family: 'Great Vibes', cursive;
      color: var(--gold);
      font-size: 16px;
      font-style: normal;
    }

    /* ---------- Reveal Animation ---------- */
    .reveal {
      opacity: 0;
      transform: translateY(40px);
      transition: all 1s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* ---------- Responsive ---------- */
    @media (max-width: 1024px) {
      .about-grid, .contact-grid { grid-template-columns: 1fr; gap: 50px; }
      .about-image img { height: 420px; }
      .footer-grid { grid-template-columns: 1fr 1fr; }
      .gallery-grid { grid-template-columns: repeat(2, 1fr); }
      .gallery-item:nth-child(1) { grid-column: span 2; grid-row: span 1; }
